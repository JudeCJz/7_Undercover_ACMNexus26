<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Link Safety Scanner</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --panel-bg: rgba(255, 255, 255, 0.03);
      --primary: #38bdf8;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --text: #f8fafc;
      --text-dim: #94a3b8;
    }

    body {
      width: 360px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .header {
      padding: 15px;
      background: var(--card-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-badge {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: #001018;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .header h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.4px;
    }

    .content {
      padding: 15px;
      display: grid;
      gap: 14px;
    }

    .status-panel,
    .panel {
      background: var(--panel-bg);
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .stat-row:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: var(--text-dim);
    }

    .stat-val {
      font-weight: 700;
      text-align: right;
    }

    .dangerous-site { color: var(--danger); }
    .safe-site { color: var(--success); }
    .warn-site { color: var(--warning); }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.7px;
    }

    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
    }

    .btn {
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: opacity 0.2s ease;
    }

    .btn:hover { opacity: 0.92; }
    .btn-primary { background: var(--primary); color: #001018; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid rgba(255, 255, 255, 0.16); color: var(--text); }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .list-container {
      max-height: 114px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item span:first-child {
      overflow-wrap: anywhere;
    }

    .remove-item {
      color: var(--danger);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }

    .helper-text {
      color: var(--text-dim);
      font-size: 11px;
      margin-top: 8px;
    }

    .feedback {
      min-height: 18px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .feedback.success { color: var(--success); }
    .feedback.error { color: var(--danger); }

    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background-color: #334155;
      transition: 0.25s;
      border-radius: 999px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.25s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(18px); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-badge">S</div>
      <h2>Sentinel One</h2>
    </div>
    <label class="switch" title="Enable or disable scanning">
      <input type="checkbox" id="scan-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="content">
    <div class="status-panel">
      <div class="stat-row">
        <span class="stat-label">System State</span>
        <span id="site-status" class="stat-val">Initializing...</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">External Links Detected</span>
        <span id="total-links" class="stat-val">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Isolated Threats</span>
        <span id="unsafe-links" class="stat-val">0</span>
      </div>
    </div>

    <div class="panel">
      <div class="section-title">Domain Controls</div>
      <div class="input-group">
        <input type="text" id="custom-url" placeholder="example.com" />
        <button id="add-blacklist" class="btn btn-danger" title="Add to blocked domains">Block</button>
      </div>
      <div class="button-grid" style="margin-top: 8px;">
        <button id="add-current-blacklist" class="btn btn-outline">Block Current</button>
        <button id="add-whitelist" class="btn btn-success">Trust Domain</button>
      </div>
      <div id="popup-feedback" class="feedback"></div>
      <div class="helper-text">Blocking removes a domain from trust. Trusting removes it from blocklist.</div>
    </div>

    <div class="panel">
      <div class="section-title">Blocked Domains</div>
      <div class="list-container" id="blacklist-view"></div>
    </div>

    <div class="panel">
      <div class="section-title">Trusted Domains</div>
      <div class="list-container" id="whitelist-view"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
