<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --primary: #38bdf8;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --text: #f8fafc;
      --text-dim: #94a3b8;
    }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      width: 350px; 
      margin: 0; 
      padding: 0; 
      background: var(--bg); 
      color: var(--text); 
    }
    .header {
      padding: 15px;
      background: var(--card-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid rgba(255,255,255,0.05);
    }
    .logo-container { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 20px; }
    .header h2 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
    
    .content { padding: 15px; }

    .status-panel {
      background: rgba(255,255,255,0.03);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 15px;
    }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    .stat-label { color: var(--text-dim); }
    .stat-val { font-weight: bold; }
    
    .dangerous-site { color: var(--danger); }
    .safe-site { color: var(--success); }

    .section-title { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin: 15px 0 8px 0; font-weight: bold; }

    .input-group { display: flex; gap: 8px; }
    input { 
      flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); 
      background: rgba(0,0,0,0.2); color: white; outline: none; font-size: 13px;
    }
    input:focus { border-color: var(--primary); }
    
    .btn { 
      padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; 
      font-weight: bold; font-size: 12px; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text); }

    .list-container {
      max-height: 120px;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      margin-top: 10px;
      font-size: 12px;
    }
    .list-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); 
    }
    .list-item:last-child { border-bottom: none; }
    .remove-item { color: var(--danger); cursor: pointer; font-size: 14px; padding: 0 5px; }

    /* Switch styling */
    .switch {
      position: relative; display: inline-block; width: 34px; height: 18px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #334155; transition: .4s; border-radius: 34px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(16px); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <span class="logo-icon">🛡️</span>
      <h2>Sentinel One</h2>
    </div>
    <label class="switch">
      <input type="checkbox" id="scan-toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="content">
    <div class="status-panel">
      <div class="stat-row">
        <span class="stat-label">System State</span>
        <span id="site-status" class="stat-val">Initializing...</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">External Links Detected</span>
        <span id="total-links" class="stat-val">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Isolated Threats</span>
        <span id="unsafe-links" class="stat-val">0</span>
      </div>
    </div>

    <div class="section-title">Enforce Restrictions</div>
    <div class="input-group">
      <input type="text" id="custom-url" placeholder="Enter suspicious domain..." />
      <button id="add-blacklist" class="btn btn-danger">+</button>
    </div>
    <div class="list-container" id="blacklist-view">
      <!-- Items populated by JS -->
    </div>
    
    <div style="margin-top: 20px; display: grid; gap: 8px;">
        <button id="add-current-blacklist" class="btn btn-outline" style="width: 100%;">
          Block Current Environment
        </button>
        <button id="add-whitelist" class="btn btn-success" style="width: 100%;">
          Trust Domain
        </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
