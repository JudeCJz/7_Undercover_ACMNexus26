<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; width: 300px; margin: 0; padding: 15px; background: #fff; color: #333; }
    h2 { margin-top: 0; font-size: 16px; color: #4CAF50; display: flex; align-items: center; gap: 8px; }
    .status-card { background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .stat { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .stat-label { font-weight: bold; }
    .danger-text { color: #F44336; font-weight: bold; }
    .safe-text { color: #4CAF50; font-weight: bold; }
    input, button { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ddd; }
    button { background: #2196F3; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:hover { background: #1976D2; }
    .danger-btn { background: #F44336; }
    .danger-btn:hover { background: #D32F2F; }
    .whitelist-btn { background: #4CAF50; }
    .whitelist-btn:hover { background: #388E3C; }
    .action-group { margin-top: 15px; }
  </style>
</head>
<body>
  <h2 id="header">🛡️ Link Safety Scanner</h2>
  
  <div class="status-card" id="scan-results">
    <div class="stat">
      <span class="stat-label">Current Site:</span>
      <span id="site-status">Scanning...</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total Links:</span>
      <span id="total-links">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Unsafe Links:</span>
      <span id="unsafe-links">0</span>
    </div>
  </div>

  <div class="action-group">
    <input type="text" id="custom-url" placeholder="Enter domain or URL..." />
    <button id="add-blacklist" class="danger-btn">Add to Blacklist</button>
    <button id="add-whitelist" class="whitelist-btn">Add to Whitelist</button>
  </div>
  
  <button id="add-current-blacklist" class="danger-btn" style="margin-top: 15px;">Blacklist Current Site</button>

  <script src="popup.js"></script>
</body>
</html>
